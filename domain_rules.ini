; domain_rules.ini
;
; Section name  = category (surfaced in the flow record's "category" field)
; key           = domain suffix to match against the TLS SNI (longest suffix wins)
; value         = human-readable app name (surfaced in "app_name")
;
; Lines starting with ; or # are comments. Blank lines are ignored.
; This file is hot-reloaded automatically when its mtime changes — see
; dpi_domain_rules_loader.c. No rebuild or restart needed to edit it.
;
; NOTE ON MAINTENANCE: this is a broad seed list from general knowledge,
; not a live-verified or complete inventory. Domains get added, rotated,
; and retired continuously, especially CDN/edge subdomains for large
; platforms. Validate against your own captured traffic and prune/extend
; from there — treat this as a starting point, not a finished dataset.
; For production-grade coverage, consider supplementing with a
; maintained commercial or open-source URL categorization feed.

