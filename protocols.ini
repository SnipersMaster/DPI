; protocols.ini — the protocol "arsenal"
;
; One place to enable/disable dissectors, instead of that decision
; being hardcoded across register_all_dissectors(). Read ONCE at
; startup, before the capture loop begins — NOT hot-reloaded like
; domain_rules.ini (see dpi_protocol_config.c's header comment for why:
; dissector registration has no "unregister" operation yet). Restart
; the engine to pick up changes here.
;
; A protocol not listed here defaults to ENABLED — this file is for
; turning things OFF, not an allowlist. Missing/unknown lines don't
; silently disable a protocol you forgot to add here.

radius = true
quic   = true
gtp    = true
gtpv2  = true
dns    = true
http1  = true
http2  = true
ssh    = true
dhcp   = true
sip    = true
rtp    = true
icmp   = true
icmpv6 = true
